<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary Product Manager — Sudha Dress Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #c9a84c;
            --bg: #0f1115;
            --card-bg: #1a1d23;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(201, 168, 76, 0.2);
            --gradient: linear-gradient(135deg, #c9a84c, #e0c26a);
            --danger: #ff4d4d;
            --success: #00c853;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; line-height: 1.6; }
        header { max-width: 1200px; margin: 0 auto 2rem; text-align: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary); margin-bottom: 0.5rem; }
        header p { color: var(--text-dim); font-size: 0.95rem; }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .panel { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; 
            padding: 2rem; position: sticky; top: 1.5rem; height: fit-content; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }

        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; font-weight: 600; color: var(--primary); text-transform: uppercase; }
        .input-group input, .input-group select { 
            width: 100%; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.05); color: #fff; outline: none; 
        }

        /* Setup Box */
        .setup-box { 
            background: rgba(201, 168, 76, 0.08); border: 1px dashed var(--primary); 
            padding: 1rem; border-radius: 12px; margin-bottom: 2rem; 
        }
        .setup-box h4 { font-size: 0.75rem; color: var(--primary); margin-bottom: 0.8rem; text-transform: uppercase; }

        .drop-zone { 
            border: 2px dashed var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; 
            cursor: pointer; background: rgba(201, 168, 76, 0.03); margin-bottom: 1rem; 
        }
        .drop-zone i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        #file-input { display: none; }

        .preview-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 1rem; max-height: 150px; overflow-y: auto; }
        .preview-item { aspect-ratio: 1; border-radius: 6px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { 
            width: 100%; padding: 1rem; border: none; border-radius: 12px; background: var(--gradient); 
            color: #000; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; 
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201, 168, 76, 0.4); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); animation: fadeIn 0.4s ease; }
        .card-img { height: 250px; position: relative; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 1.2rem; }
        .card-info h3 { font-size: 1rem; color: #fff; margin-bottom: 0.3rem; }
        .card-info .price { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
        .card-info .cat { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; }

        .loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-overlay.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(201, 168, 76, 0.2); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        .progress-bar { width: 250px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 50px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--gradient); transition: width 0.2s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .panel { position: relative; top: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Sudha <em>Cloud Manager</em></h1>
        <p>Premium Cloudinary Image Hosting for Sudha Dress Shop</p>
    </header>

    <div class="container">
        <aside class="panel">
            <div class="setup-box">
                <h4><i class="fas fa-cog"></i> Cloudinary Setup</h4>
                <div class="input-group">
                    <input type="text" id="setup-cloud-name" placeholder="Cloud Name" onchange="saveCloudPrefs()" />
                </div>
                <div class="input-group" style="margin-bottom:0;">
                    <input type="text" id="setup-preset" placeholder="Unsigned Preset" onchange="saveCloudPrefs()" />
                </div>
                <small style="font-size:0.65rem; color:var(--text-dim); margin-top:5px; display:block;">Enter details from your Cloudinary dashboard.</small>
            </div>

            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="prod-name" placeholder="E.g. Silk Saree" />
            </div>

            <div class="input-group">
                <label>Category</label>
                <select id="prod-cat">
                    <option value="sarees">Sarees</option>
                    <option value="lehengas">Lehengas</option>
                    <option value="suits">Salwar Suits</option>
                    <option value="kurtis">Kurtis & Tops</option>
                    <option value="kids">Kids' Wear</option>
                    <option value="mens">Men's Wear</option>
                </select>
            </div>

            <div class="input-group">
                <label>Price (₹)</label>
                <input type="number" id="prod-price" placeholder="Price" />
            </div>

            <div class="drop-zone" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p style="font-size:0.85rem;">Click to Upload Images</p>
            </div>
            <input type="file" id="file-input" multiple accept="image/*" onchange="handleFileSelect(event)" />

            <div class="preview-area" id="preview-area"></div>

            <button class="btn-main" onclick="startBulkUpload()">
                <i class="fas fa-check"></i> Save Product to Cloud
            </button>
            <p id="status-text" style="font-size:0.7rem; text-align:center; color:var(--text-dim); margin-top:10px;"></p>
        </aside>

        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h2>Cloud Showcase</h2>
                <div id="stat-count" style="font-size:0.9rem; color:var(--primary); font-weight:700;">0 Products</div>
            </div>
            <div class="product-grid" id="product-grid"></div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div class="loader-overlay" id="loader-overlay">
        <div class="spinner"></div>
        <h3>Uploading to Cloudinary...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p id="progress-text" style="font-size:0.8rem; color:var(--primary);">0% Complete</p>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let CLOUD_NAME = localStorage.getItem('cloudinary_name') || '';
        let UPLOAD_PRESET = localStorage.getItem('cloudinary_preset') || '';
        const SYNC_ID = typeof JSONBLOB_ID !== 'undefined' ? JSONBLOB_ID : null;

        let selectedFiles = [];
        let productGallery = [];

        window.onload = () => {
            document.getElementById('setup-cloud-name').value = CLOUD_NAME;
            document.getElementById('setup-preset').value = UPLOAD_PRESET;
            fetchFromCloud();
        };

        function saveCloudPrefs() {
            CLOUD_NAME = document.getElementById('setup-cloud-name').value.trim();
            UPLOAD_PRESET = document.getElementById('setup-preset').value.trim();
            localStorage.setItem('cloudinary_name', CLOUD_NAME);
            localStorage.setItem('cloudinary_preset', UPLOAD_PRESET);
        }

        async function fetchFromCloud() {
            if (!SYNC_ID) return;
            try {
                const res = await fetch(`https://jsonblob.com/api/jsonBlob/${SYNC_ID}?t=${Date.now()}`);
                const data = await res.json();
                productGallery = data.cloudinary_products || [];
                renderGallery();
            } catch (e) {
                console.warn('Load failed:', e);
                productGallery = JSON.parse(localStorage.getItem('cloudinary_products') || '[]');
                renderGallery();
            }
        }

        async function syncToCloud() {
            localStorage.setItem('cloudinary_products', JSON.stringify(productGallery));
            if (!SYNC_ID) return;
            try {
                const res = await fetch(`https://jsonblob.com/api/jsonBlob/${SYNC_ID}`);
                const data = await res.json();
                data.cloudinary_products = productGallery;
                await fetch(`https://jsonblob.com/api/jsonBlob/${SYNC_ID}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) { console.error('Sync failed:', e); }
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                selectedFiles.push(f);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `<img src="${ev.target.result}" />`;
                    document.getElementById('preview-area').appendChild(div);
                };
                reader.readAsDataURL(f);
            });
            document.getElementById('status-text').textContent = `${selectedFiles.length} images ready`;
        }

        async function startBulkUpload() {
            saveCloudPrefs();
            const name = document.getElementById('prod-name').value.trim();
            const price = document.getElementById('prod-price').value.trim();
            const cat = document.getElementById('prod-cat').value;

            if (!name || !price || selectedFiles.length === 0) return alert('Name, price and images required!');
            if (!CLOUD_NAME || !UPLOAD_PRESET) return alert('Please enter Cloud Name and Preset in the setup box.');

            const loader = document.getElementById('loader-overlay');
            loader.classList.add('active');
            const urls = [];

            try {
                for (let i=0; i<selectedFiles.length; i++) {
                    const formData = new FormData();
                    formData.append('file', selectedFiles[i]);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: 'POST', body: formData
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error?.message || 'Upload failed');
                    }
                    const data = await res.json();
                    urls.push(data.secure_url);

                    const p = Math.round(((i+1)/selectedFiles.length)*100);
                    document.getElementById('progress-fill').style.width = p + '%';
                    document.getElementById('progress-text').textContent = `${p}% Complete`;
                }

                productGallery.unshift({ id: Date.now(), name, price, category: cat, images: urls, date: new Date().toLocaleDateString() });
                await syncToCloud();
                
                loader.classList.remove('active');
                alert('Success! Product saved to cloud.');
                location.reload();
            } catch (err) {
                loader.classList.remove('active');
                alert('Error: ' + err.message);
            }
        }

        function renderGallery() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            document.getElementById('stat-count').textContent = `${productGallery.length} Products`;

            productGallery.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-img"><img src="${p.images[0]}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="cat">${p.category}</div>
                        <h3>${p.name}</h3>
                        <div class="price">₹${parseInt(p.price).toLocaleString()}</div>
                        <button onclick="deleteProd(${p.id})" style="margin-top:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.75rem;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        async function deleteProd(id) {
            if (confirm('Delete product?')) {
                productGallery = productGallery.filter(x => x.id !== id);
                await syncToCloud();
                renderGallery();
            }
        }
    </script>
</body>
</html>
